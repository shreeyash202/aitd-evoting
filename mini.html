<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AITD E-Voting System</title>
<style>
/* ====== GLOBAL STYLING ====== */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body {
  background: radial-gradient(circle at top, #0a0f24, #000);
  color: white;
  overflow-x: hidden;
}
.container {
  width: 100%; max-width: 430px; margin: auto; padding: 20px;
}
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  padding: 22px; border-radius: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  animation: fadeIn 0.7s ease;
}
@keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1;} }
button {
  width: 100%; padding: 12px; margin-top: 15px;
  border-radius: 10px; border: none;
  background: linear-gradient(90deg,#0066ff,#00c3ff);
  color: white; font-size: 16px; cursor: pointer;
  transition: 0.3s;
}
button:hover { transform: scale(1.03); }
input, select {
  width: 100%; padding: 12px; margin-top: 12px;
  border-radius: 8px; outline: none;
  border: 1px solid #333;
  background: rgba(255,255,255,0.1);
  color: white;
}
h2 { text-align: center; margin-bottom: 10px; }
.hidden { display: none; }

/* Section Titles */
.section-title { margin-top: 30px; font-size: 22px; font-weight: 600; text-align:center; }

/* Toggle Switch */
.switch { position:relative; display:inline-block; width:60px; height:34px; }
.switch input { display:none; }
.slider {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:#555; cursor:pointer; transition:.4s; border-radius:34px;
}
.slider:before {
  position:absolute; content:"";
  height:26px; width:26px; left:4px; bottom:4px;
  background:white; border-radius:50%; transition:.4s;
}
input:checked + .slider { background:#00c3ff; }
input:checked + .slider:before { transform:translateX(26px); }

/* Candidate Radio Buttons */
.vote-box { margin: 12px 0; padding: 12px; background:rgba(255,255,255,0.05); border-radius:10px; }
.vote-box label { cursor:pointer; display:block; padding:8px 0; }

</style>
</head>
<body>
<div class="container">

  <!-- Select Mode -->
  <div class="card" id="selectPage">
    <h2>Select User Type</h2>
    <div style="text-align:center; margin-top:15px;">
      <label class="switch">
        <input type="checkbox" id="userToggle">
        <span class="slider"></span>
      </label>
    </div>
    <p style="text-align:center; margin-top:10px;" id="toggleText">Student</p>
    <button onclick="goNext()">Continue</button>
  </div>

  <!-- Admin Login -->
  <div class="card hidden" id="adminLogin">
    <h2>Admin Login</h2>
    <input type="text" id="adminUser" placeholder="Admin Username" />
    <input type="password" id="adminPass" placeholder="Admin Password" />
    <button onclick="adminLoginNow()">Login</button>
  </div>

  <!-- Student Register -->
  <div class="card hidden" id="registerPage">
    <h2>Student Registration</h2>
    <input id="regRoll" placeholder="Roll Number" />
    <input id="regEmail" placeholder="Email" />
    <input type="password" id="regPass" placeholder="Password" />
    <input type="password" id="regCPass" placeholder="Confirm Password" />
    <button onclick="registerStudent()">Register</button>
  </div>

  <!-- Student Login + OTP -->
  <div class="card hidden" id="studentLogin">
    <h2>Student Login</h2>
    <input id="logRoll" placeholder="Roll Number" />
    <input type="password" id="logPass" placeholder="Password" />
    <button onclick="sendOTP()">Send OTP</button>
    <div id="otpArea" class="hidden">
      <input id="otpInput" placeholder="Enter OTP" />
      <button onclick="verifyOTP()">Verify</button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="card hidden" id="adminPanel">
    <h2>Add Candidates</h2>
    <select id="postSelect">
      <option value="GS">General Secretary</option>
      <option value="CS">Cultural Secretary</option>
      <option value="SS">Sports Secretary</option>
    </select>
    <input id="candName" placeholder="Candidate Name" />
    <button onclick="addCandidate()">Add Candidate</button>
    <button onclick="publishCandidates()">Publish</button>
  </div>

  <!-- Voting Page -->
  <div class="card hidden" id="votePage">
    <h2>Vote Your Leaders</h2>
    <div id="voteContainer"></div>
    <button onclick="submitVote()">Submit Vote</button>
  </div>

  <!-- Thank You -->
  <div class="card hidden" id="thanksPage">
    <h2>Thank You for Voting!</h2>
  </div>

</div>

<script>
let generatedOTP = null;
const adminData = { username: "admin123", password: "adminpass" };

function show(page){
  document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
  document.getElementById(page).classList.remove('hidden');
}

document.getElementById('userToggle').addEventListener('change',()=>{
  document.getElementById('toggleText').innerText = 
    document.getElementById('userToggle').checked ? "Admin" : "Student";
});

function goNext(){
  let mode = document.getElementById('userToggle').checked;
  if(mode) show('adminLogin');
  else show('registerPage');
}

function adminLoginNow(){
  let u = adminData.username;
  let p = adminData.password;
  if(document.getElementById('adminUser').value === u && document.getElementById('adminPass').value === p)
    show('adminPanel');
  else alert("Invalid admin details");
}

function registerStudent(){
  let roll = regRoll.value.trim();
  let email = regEmail.value.trim();
  let pass = regPass.value;
  let cpass = regCPass.value;

  if(pass !== cpass) return alert("Passwords don't match");

  let students = JSON.parse(localStorage.getItem('students')||"[]");
  students.push({roll,email,pass});
  localStorage.setItem('students',JSON.stringify(students));

  alert("Registered successfully");
  show('studentLogin');
}

function sendOTP(){
  let roll = logRoll.value.trim();
  let pass = logPass.value;

  let students = JSON.parse(localStorage.getItem('students')||"[]");
  let found = students.find(s=>s.roll===roll && s.pass===pass);
  if(!found) return alert("Student not found");

  generatedOTP = Math.floor(1000+Math.random()*9000);
  alert("Your OTP is: "+generatedOTP);
  otpArea.classList.remove('hidden');
}

function verifyOTP(){
  if(otpInput.value==generatedOTP) loadVoting();
  else alert("Incorrect OTP");
}

let candidateData = {};
function addCandidate(){
  let post = postSelect.value;
  let name = candName.value.trim();
  if(!name) return;
  if(!candidateData[post]) candidateData[post] = [];
  candidateData[post].push(name);
  candName.value="";
  alert("Candidate added");
}

function publishCandidates(){
  localStorage.setItem('candidates',JSON.stringify(candidateData));
  alert("Published!");
  show('selectPage');
}

function loadVoting(){
  show('votePage');
  let data = JSON.parse(localStorage.getItem('candidates')||"{}");
  let area = document.getElementById('voteContainer');
  area.innerHTML="";

  for(let post in data){
    let box = document.createElement('div');
    box.className = 'vote-box';
    box.innerHTML = `<h3>${post}</h3>`;

    data[post].forEach((c,i)=>{
      box.innerHTML += `<label><input type='radio' name='${post}' value='${c}'> ${c}</label>`;
    });
    area.appendChild(box);
  }
}

function submitVote(){
  alert("Vote Submitted!");
  show('thanksPage');
}
</script>
</body>
</html>
